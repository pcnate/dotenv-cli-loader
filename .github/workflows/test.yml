name: Unit Tests

on:
  push:
    branches: 
      - main
      - master
      - development
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Dependencies
        shell: bash
        run: |
          npm ci

      - name: Run Tests
        shell: bash
        run: |
          npm test
